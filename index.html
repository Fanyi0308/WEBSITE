<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樊翊頡 - 個人簡歷</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
        }

        /* 左側側邊欄 */
        .sidebar {
            flex: 1;
            min-width: 300px;
            background-color: var(--primary-color);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .profile-img {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            border: 4px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }

        .sidebar h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .contact-info {
            text-align: left;
            font-size: 0.9rem;
        }

        .contact-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .contact-item i {
            margin-right: 15px;
            width: 20px;
            color: var(--accent-color);
        }

        /* 右側主內容 */
        .main-content {
            flex: 2;
            min-width: 400px;
            padding: 50px;
        }

        section {
            margin-bottom: 40px;
        }

        h3 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        h3 i {
            margin-right: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
        }
